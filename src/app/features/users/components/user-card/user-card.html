<article
  class="group rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-blue-300 hover:shadow-xl"
>
  <div class="flex items-start gap-4">
    <img
      [src]="user.image"
      [alt]="user.firstName"
      class="h-16 w-16 rounded-full ring-2 ring-slate-100 object-cover transition-all duration-300 group-hover:ring-blue-200"
    />

    <div class="min-w-0 flex-1">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <h2 class="text-xl font-bold text-slate-900 tracking-tight">
            {{ user.firstName }} {{ user.lastName }}
          </h2>

          <p class="mt-1 truncate text-sm text-slate-500">{{ user.email }}</p>

          <p class="mt-1 truncate text-sm font-medium text-blue-600">@{{ user.username }}</p>
        </div>
      </div>

      <div class="mt-4 flex flex-wrap items-center gap-2">
        <span
          class="rounded-full bg-blue-50 px-3 py-1 text-xs font-bold uppercase tracking-wide text-blue-700"
        >
          {{ user.role }}
        </span>

        <span
          class="rounded-full px-3 py-1 text-xs font-bold tracking-wide"
          [class.bg-green-50]="user.active"
          [class.text-green-700]="user.active"
          [class.bg-red-50]="!user.active"
          [class.text-red-700]="!user.active"
        >
          {{ user.active ? 'Activo' : 'Inactivo' }}
        </span>
      </div>
    </div>
  </div>

  <div class="mt-5 border-t border-slate-100 pt-2 text-xs text-slate-400">
    User ID:
    <span class="font-semibold text-slate-500"> {{ user.id }} </span>
  </div>
</article>

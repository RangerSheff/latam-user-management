<div class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm transition hover:shadow-md">
  <div class="flex items-center gap-4">
    <img
      [src]="user.image"
      [alt]="user.firstName"
      class="h-16 w-16 rounded-full border border-gray-200 object-cover"
    />

    <div class="flex-1">
      <h2 class="text-xl font-bold text-gray-900">{{ user.firstName }} {{ user.lastName }}</h2>

      <p class="text-sm text-gray-500">{{ user.email }}</p>

      <p class="text-sm text-blue-600">@{{ user.username }}</p>

      <!-- BADGES -->
      <div class="mt-3 flex gap-2">
        <span class="rounded-full bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-600">
          {{ user.role }}
        </span>

        <span
          class="rounded-full px-3 py-1 text-xs font-semibold"
          [class.bg-green-50]="user.active"
          [class.text-green-600]="user.active"
          [class.bg-red-50]="!user.active"
          [class.text-red-600]="!user.active"
        >
          {{ user.active ? 'Activo' : 'Inactivo' }}
        </span>
      </div>
    </div>
  </div>
</div>
